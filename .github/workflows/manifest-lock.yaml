name: lock

on:
  schedule:
    - cron: "8 17 * * *"
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  update-locks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          activate-environment: "true"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Regenerate lock files
        run: uv run python scripts/lock.py

      - name: Create PR if locks changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update lock files"
          title: "chore: update lock files"
          body: |
            Automated lock file update.

            This PR was created automatically by the daily lock refresh workflow.
          branch: auto/update-locks
          delete-branch: true
          token: "${{ secrets.PAT }}"
