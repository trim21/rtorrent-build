name: lock

on:
  schedule:
    - cron: "8 17 * * *"
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  update-locks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Install Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          activate-environment: "true"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set cache date
        id: cache-date
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "month=$(date +%Y-%m)" >> $GITHUB_OUTPUT
          echo "year=$(date +%Y)" >> $GITHUB_OUTPUT

      - name: Cache downloaded sources
        uses: actions/cache@v6
        with:
          path: assets/
          key: lock-sources-${{ hashFiles('manifests/*.lock') }}-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            lock-sources-${{ hashFiles('manifests/*.lock') }}-${{ steps.cache-date.outputs.month }}
            lock-sources-${{ hashFiles('manifests/*.lock') }}-${{ steps.cache-date.outputs.year }}
            lock-sources-${{ hashFiles('manifests/*.lock') }}

      - name: Regenerate lock files
        run: uv run python scripts/lock.py

      - name: Regenerate README
        run: uv run python scripts/generate_readme.py --write

      - name: Generate PR body
        run: uv run python scripts/pr-body.py --output-file /tmp/pr-body.md
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Create PR if locks changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: update lock files"
          title: "chore: update lock files"
          body-path: /tmp/pr-body.md
          branch: auto/update-locks
          delete-branch: true
          token: "${{ secrets.PAT }}"
