name: build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - rtorrent-0.9.8
          - rtorrent-0.16
          - qbittorrent-5.2-lt2
          - qbittorrent-5.2-lt1
          - qbittorrent-5.1-lt2
          - qbittorrent-5.1-lt1
        libc: [glibc, musl]
        arch:
          - { flag: amd/v1, name: amd.v1 }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install autotools
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: "true"

      - name: Install main dependencies
        run: uv sync --frozen

      - name: Cache toolchain
        uses: actions/cache@v5
        with:
          path: toolchains/default/.venv
          key: toolchain-${{ hashFiles('toolchains/default/pyproject.toml') }}

      - name: Cache downloaded sources
        uses: actions/cache@v5
        with:
          path: assets/
          key: sources-${{ hashFiles('manifests/*.lock') }}

      - name: Cache build artifacts (Merkle tree)
        uses: actions/cache@v5
        with:
          path: .rtorrent-cache/
          key: build-v1-${{ matrix.arch.name }}-${{ matrix.libc }}-${{ matrix.variant }}-${{ github.run_id }}
          restore-keys: |
            build-v1-${{ matrix.arch.name }}-${{ matrix.libc }}-${{ matrix.variant }}
            build-v1-${{ matrix.arch.name }}-${{ matrix.libc }}

      - name: Build ${{ matrix.variant }} (${{ matrix.libc }}/${{ matrix.arch.name }})
        env:
          PYTHONUNBUFFERED: "1"
          RTORRENT_CACHE_DIR: ${{ github.workspace }}/.rtorrent-cache
        run: python build.py build "manifests/${{ matrix.variant }}.jsonc" --libc "${{ matrix.libc }}" --arch "${{ matrix.arch.flag }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.variant }}-${{ matrix.libc }}-${{ matrix.arch.name }}
          path: "dist/*"
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
