name: update uv lock

on:
  push:
    branches: [master]
  schedule:
    - cron: "8 17 * * *"
  workflow_dispatch:

jobs:
  lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Update lock file
        run: uv lock --upgrade

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update uv.lock"
          title: "chore: update uv.lock"
          branch: auto/uv-lock-update
          token: "${{ secrets.PAT }}"
          body: Automated update of `uv.lock` dependencies.
