name: docker

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: trim21/rtorrent

jobs:
  docker:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - rtorrent-0.9.8
          - rtorrent-0.16
          - rtorrent-master
        libc: [glibc]
        arch:
          - { flag: amd/v1, name: amd.v1 }
          - { flag: amd/v3, name: amd.v3 }
        disguise: [false]
        debug: [false]
        include:
          - variant: rtorrent-master
            libc: glibc
            arch: { flag: amd/v1, name: amd.v1 }
            disguise: true
            debug: false
          - variant: rtorrent-master
            libc: glibc
            arch: { flag: amd/v3, name: amd.v3 }
            disguise: true
            debug: false
          - variant: rtorrent-master
            libc: glibc
            arch: { flag: amd/v4, name: amd.v4 }
            disguise: true
            debug: false
          # - variant: rtorrent-trim21-fork
          #   libc: glibc
          #   arch: { flag: amd/v1, name: amd.v1 }
          #   disguise: true
          #   debug: false
          # - variant: rtorrent-trim21-fork
          #   libc: glibc
          #   arch: { flag: amd/v1, name: amd.v1 }
          #   disguise: true
          #   debug: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install autotools
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          activate-environment: "true"

      - name: Install main dependencies
        run: uv sync --frozen

      - name: Cache downloaded sources
        uses: actions/cache@v5
        with:
          path: assets/
          key: docker-sources-${{ hashFiles('manifests/*.lock') }}

      - name: Cache build artifacts (Merkle tree)
        uses: actions/cache@v5
        with:
          path: .rtorrent-cache/
          key: docker-v1-a${{ matrix.debug }}-${{ matrix.arch.name }}-${{ matrix.libc }}-${{ matrix.variant }}-b${{ matrix.disguise }}-${{ github.run_id }}
          restore-keys: |
            docker-v1-a${{ matrix.debug }}-${{ matrix.arch.name }}-${{ matrix.libc }}-${{ matrix.variant }}-b${{ matrix.disguise }}
            docker-v1-a${{ matrix.debug }}-${{ matrix.arch.name }}-${{ matrix.libc }}-${{ matrix.variant }}
            docker-v1-a${{ matrix.debug }}-${{ matrix.arch.name }}-${{ matrix.libc }}

      - run: ls -ahl .rtorrent-cache/
      - run: tree .rtorrent-cache/

      - name: Build ${{ matrix.variant }} (${{ matrix.libc }}/${{ matrix.arch.name }})${{ matrix.disguise && ' disguised' || '' }}${{ matrix.debug && ' debug' || '' }}
        env:
          PYTHONUNBUFFERED: "1"
          RTORRENT_BUILD_DEBUG: "${{ matrix.debug }}"
          RTORRENT_BUILD_DISGUISE: "${{ matrix.disguise }}"
          RTORRENT_CACHE_DIR: ${{ github.workspace }}/.rtorrent-cache
        run: |
          python build.py build "manifests/${{ matrix.variant }}.jsonc" \
            --libc "${{ matrix.libc }}" \
            --arch "${{ matrix.arch.flag }}" \
            --docker \
            --build-info build-info.json

      - run: ls -ahl .rtorrent-cache/
      - run: tree .rtorrent-cache/

      - name: Log in to Container Registry
        if: (matrix.disguise && github.event_name != 'pull_request') || (!matrix.disguise && startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: (matrix.disguise && github.event_name != 'pull_request') || (!matrix.disguise && startsWith(github.ref, 'refs/tags/'))
        run: |
          TAGS="$(jq -r '.tags[]' build-info.json)"
          for TAG in $TAGS; do
            LOCAL_TAG="rtorrent:${TAG}"
            GHCR_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
            docker tag "$LOCAL_TAG" "$GHCR_TAG"
            docker push "$GHCR_TAG"
            echo "Pushed $GHCR_TAG"
          done
