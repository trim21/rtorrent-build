name: cleanup runs

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to clean up runs for"
        required: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: styfle/cancel-workflow-action@0.13.1
        with:
          workflow_id: all
          ignore_sha: true
          access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete PR caches
        if: github.event_name == 'pull_request'
        run: gh cache delete --all --repo ${{ github.repository }} --ref "refs/pull/${{ github.event.pull_request.number }}/merge" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
