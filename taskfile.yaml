version: "3"

tasks:
  lock:
    desc: "Lock the build environment (e.g. task lock)"
    cmds:
      - python scripts/lock.py {{.CLI_ARGS}}

  build:
    desc: "Build a variant (e.g. task build VARIANT=manifests/rtorrent-0.16.jsonc)"
    cmds:
      - python build.py build {{.VARIANT}} {{.CLI_ARGS}}
    requires:
      vars: [VARIANT]

  all:
    desc: Build all variants (auto-discovered from manifests/)
    run: always
    sources:
      - "manifests/*.jsonc"
    cmds:
      - for: sources
        task: build
        vars:
          VARIANT: "{{.ITEM}}"
