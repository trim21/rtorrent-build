version: "3"

vars:
  VARIANTS:
    - rtorrent-0.9.8
    - rtorrent-0.16
    - rtorrent-master
    - rtorrent-fork
    - qbittorrent-5.2-lt2
    - qbittorrent-5.2-lt1
    - qbittorrent-5.1-lt2
    - qbittorrent-5.1-lt1

tasks:
  build:
    desc: "Build a variant (e.g. task build VARIANT=rtorrent-0.16)"
    cmds:
      - python build.py {{.VARIANT}} {{.CLI_ARGS}}
    requires:
      vars: [VARIANT]

  all:
    desc: Build all variants
    cmds:
      - for: { var: VARIANTS }
        task: build
        vars:
          VARIANT: "{{.ITEM}}"
